<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VGCK | Premium Software Studio</title>
    <style>
        :root {
            --bg-dark: #050609;
            --surface-glass: rgba(13, 15, 24, 0.65);
            --border: rgba(255, 255, 255, 0.04);
            --border-hover: rgba(0, 255, 163, 0.25);
            
            --accent: #00ffa3;
            --accent-glow: rgba(0, 255, 163, 0.15);
            --blue: #3b82f6;
            --blue-glow: rgba(59, 130, 246, 0.25);
            
            --text-main: #f8fafc;
            --text-secondary: #94a3b8;
            --text-dim: #475569;
            --danger: #ff4757;
            --success-bg: rgba(0, 255, 163, 0.06);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.5;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* ------------------------------------------------------------- */
        /* CINEMATIC FLOATING LIGHT ORBS BACKGROUND (PURE CSS)            */
        /* ------------------------------------------------------------- */
        .ambient-glow-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            pointer-events: none;
            overflow: hidden;
            background: #040508;
        }

        .light-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            mix-blend-mode: screen;
            animation: floatAround 25s infinite alternate ease-in-out;
        }

        /* Orb 1 - Cyan/Green Light */
        .orb-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
            top: -10%;
            left: 10%;
            animation-duration: 20s;
        }

        /* Orb 2 - Deep Cyber Blue */
        .orb-2 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #3b82f6 0%, transparent 70%);
            bottom: -10%;
            right: 5%;
            animation-duration: 28s;
            animation-delay: -5s;
        }

        /* Orb 3 - Soft Ambient Pulse */
        .orb-3 {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, #8b5cf6 0%, transparent 70%);
            top: 40%;
            left: 60%;
            animation-duration: 22s;
            animation-delay: -12s;
        }

        @keyframes floatAround {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(60px, 40px) scale(1.1); }
            100% { transform: translate(-40px, 80px) scale(0.9); }
        }

        /* Front subtle lighting layer */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.02) 0%, transparent 50%);
            z-index: -1;
            pointer-events: none;
        }

        /* ------------------------------------------------------------- */

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        .hidden { display: none !important; }

        /* Navigation Bar */
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(10, 11, 18, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 16px 32px;
            border-radius: 14px;
            margin-bottom: 60px;
        }

        .nav-logo {
            font-weight: 800;
            font-size: 1.25rem;
            letter-spacing: -0.5px;
            background: linear-gradient(180deg, #ffffff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 24px;
            list-style: none;
        }

        .nav-links li {
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: color 0.2s;
        }

        .nav-links li:hover, .nav-links li.active { color: #ffffff; }

        .nav-right { display: flex; align-items: center; gap: 12px; }

        .nav-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            color: #ffffff;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }

        .nav-btn:hover { background: #ffffff; color: var(--bg-dark); }

        /* Status Title Section */
        .status-header { margin-bottom: 32px; }
        .status-header span {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-dim);
            font-weight: 700;
        }
        .status-header h2 { font-size: 2rem; font-weight: 700; letter-spacing: -0.5px; margin-top: 4px; }

        /* Grid & Glass Cards */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 60px;
        }

        .card {
            background: var(--surface-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 28px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .card:hover {
            border-color: var(--border-hover);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4), 0 0 20px var(--accent-glow);
            transform: translateY(-2px);
        }

        .card-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .card-meta .cat {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--text-dim);
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .card-meta h3 {
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            margin-top: 2px;
            color: #ffffff;
        }

        /* Status Badges */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--success-bg);
            border: 1px solid rgba(0, 255, 163, 0.15);
            color: var(--accent);
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            padding: 4px 10px;
            border-radius: 20px;
            letter-spacing: 0.5px;
        }

        .status-badge::before {
            content: '';
            width: 5px; height: 5px;
            background-color: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 6px var(--accent);
        }

        .price-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.02);
            padding-top: 20px;
        }

        .price-col .lbl { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; display: block; }
        .price-col .val { font-size: 1.5rem; font-weight: 700; color: #ffffff; }

        /* Interactive Controls */
        .action-btn, .submit-btn, .back-ui-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
            outline: none;
            border-radius: 8px;
            text-decoration: none;
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            color: #ffffff;
            padding: 10px 20px;
        }

        .card:hover .action-btn {
            background: #ffffff;
            color: var(--bg-dark);
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.1);
        }

        .action-btn:active, .submit-btn:active, .back-ui-btn:active { transform: scale(0.97); }

        /* Configuration Interface Pane */
        .selection-pane {
            max-width: 500px;
            margin: 60px auto;
            background: rgba(13, 15, 24, 0.75);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 36px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .back-ui-btn { background: none; color: var(--text-dim); margin-bottom: 20px; }
        .back-ui-btn:hover { color: #ffffff; }

        .selection-pane h2 { font-size: 1.75rem; font-weight: 700; margin-bottom: 4px; }
        .selection-price-display { font-size: 2.2rem; font-weight: 800; color: #ffffff; margin-bottom: 28px; }

        .plan-row {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 18px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .plan-row:hover { border-color: rgba(255, 255, 255, 0.1); }
        .plan-row.selected { border-color: var(--blue); background: rgba(59, 130, 246, 0.03); }
        .plan-row strong { font-weight: 600; font-size: 0.95rem; }
        .plan-row .p-val { font-weight: 700; color: var(--blue); }

        .pane-actions { margin-top: 32px; display: flex; gap: 12px; }
        .submit-btn { width: 100%; padding: 14px; font-size: 0.95rem; }
        .submit-btn.primary { background: var(--blue); color: white; }
        .submit-btn.primary:hover { box-shadow: 0 5px 20px var(--blue-glow); filter: brightness(1.1); }
        .submit-btn.secondary { background: rgba(255,255,255,0.02); border: 1px solid var(--border); color: var(--text-secondary); }

        /* Cooldown Security Popups */
        .modal-view {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(3, 4, 7, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 24px;
        }

        .warning-popup {
            background: #0d0a0b;
            border: 1px solid rgba(255, 71, 87, 0.2);
            border-radius: 16px;
            max-width: 440px;
            width: 100%;
            padding: 40px;
            text-align: center;
        }

        .warning-icon {
            font-size: 2.2rem;
            color: var(--danger);
            margin-bottom: 16px;
            background: rgba(255, 71, 87, 0.08);
            width: 60px; height: 60px;
            line-height: 60px;
            border-radius: 50%;
            display: inline-block;
        }

        .warning-popup h2 { font-size: 1.35rem; font-weight: 700; margin-bottom: 10px; }
        .warning-popup p { color: var(--text-secondary); font-size: 0.9rem; line-height: 1.5; margin-bottom: 24px; }

        .countdown-box {
            font-size: 0.8rem;
            color: var(--text-dim);
            font-weight: 600;
            text-transform: uppercase;
            background: rgba(255,255,255,0.01);
            padding: 8px 18px;
            border-radius: 8px;
            border: 1px solid var(--border);
            display: inline-block;
        }

        /* Invoice Interface View */
        .invoice-pane {
            max-width: 460px;
            margin: 60px auto;
            background: rgba(13, 15, 24, 0.75);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            text-align: center;
        }

        .amount-container {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            margin: 24px 0;
        }
        .amount-container .lbl { font-size: 0.7rem; text-transform: uppercase; color: var(--text-dim); display: block; margin-bottom: 2px; }
        .amount-container .amt { font-size: 2.2rem; font-weight: 700; color: #ffffff; }

        .address-row { text-align: left; margin-bottom: 20px; }
        .address-row label { font-size: 0.75rem; font-weight: 600; color: var(--text-secondary); display: block; margin-bottom: 6px; text-transform: uppercase; }
        .address-input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            padding: 14px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.8rem;
            color: #ffffff;
            word-break: break-all;
            user-select: all;
        }

        .final-btn {
            background: #ffffff;
            color: var(--bg-dark);
            padding: 14px;
            width: 100%;
            border-radius: 10px;
            font-size: 0.95rem;
            margin-top: 24px;
            font-weight: bold;
        }
        .final-btn:hover:not(:disabled) {
            background: var(--accent);
            box-shadow: 0 5px 15px rgba(0, 255, 163, 0.2);
        }
        .final-btn:disabled {
            background: rgba(255,255,255,0.02);
            color: var(--text-dim);
            border: 1px solid var(--border);
            cursor: not-allowed;
        }

        /* Footer Banner Area */
        .footer-banner {
            border-top: 1px solid rgba(255,255,255,0.02);
            padding: 40px 0;
            margin-top: 80px;
            text-align: center;
        }
        .footer-banner p { color: var(--text-secondary); font-size: 0.95rem; }

        footer { text-align: center; color: var(--text-dim); font-size: 0.8rem; margin-top: 20px; }
    </style>
</head>
<body>

                        </div>

                            <span class="status-badge">Undetected</span>
